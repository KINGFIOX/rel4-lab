[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = [
    "-C", "code-model=medium",
    "-C", "relocation-model=static",
    "-C", "force-frame-pointers=yes",
]

[target.loongarch64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "force-frame-pointers=yes",
]

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "force-frame-pointers=yes",
]
